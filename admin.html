<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AMS Admin | تحديث البيانات</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; padding: 50px; text-align: center; }
        .upload-box { background: #1e293b; padding: 40px; border-radius: 15px; border: 2px dashed #38bdf8; max-width: 500px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn { background: #38bdf8; color: #0f172a; padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; transition: 0.3s; font-family: inherit; }
        .btn:hover { background: #0ea5e9; transform: scale(1.05); }
        #status { margin-top: 20px; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

    <div class="upload-box">
        <h2 style="color: #38bdf8;">نظام AMS - لوحة التحكم السحابية</h2>
        <p>ارفع ملف الإكسل (أو CSV) الجديد. سيتم حذف البيانات القديمة وتحديثها فوراً (Live) للمستخدمين.</p>
        <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" style="margin-top: 15px; width: 100%;" />
        <br>
        <button class="btn" id="uploadBtn">بدء مزامنة البيانات</button>
        <div id="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, writeBatch } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7NXaKA73Ej9ixU28fpgex2144W5eymTY",
            authDomain: "ams-dashboard-a17e6.firebaseapp.com",
            projectId: "ams-dashboard-a17e6",
            storageBucket: "ams-dashboard-a17e6.firebasestorage.app",
            messagingSenderId: "1085957371828",
            appId: "1:1085957371828:web:5ba822ac622422a43464e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "ams_sales_data");

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('excelFile');
            const statusDiv = document.getElementById('status');

            if (!fileInput.files.length) {
                statusDiv.innerHTML = "<span style='color:#ef4444;'>الرجاء اختيار ملف أولاً!</span>";
                return;
            }

            statusDiv.innerHTML = "<span style='color:#eab308;'>جاري قراءة الملف... يرجى الانتظار.</span>";
            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);

                    if (jsonData.length === 0) throw new Error("الملف فارغ!");

                    statusDiv.innerHTML = "<span style='color:#eab308;'>جاري تنظيف قاعدة البيانات السحابية...</span>";
                    const snapshot = await getDocs(colRef);
                    let batchDelete = writeBatch(db);
                    let delCount = 0;
                    
                    for (const docSnap of snapshot.docs) {
                        batchDelete.delete(docSnap.ref);
                        delCount++;
                        if (delCount === 400) {
                            await batchDelete.commit();
                            batchDelete = writeBatch(db);
                            delCount = 0;
                        }
                    }
                    if (delCount > 0) await batchDelete.commit();

                    statusDiv.innerHTML = "<span style='color:#38bdf8;'>جاري رفع البيانات الجديدة (Live Synchronization)...</span>";
                    let batchInsert = writeBatch(db);
                    let insCount = 0;

                    for (let i = 0; i < jsonData.length; i++) {
                        const newDocRef = doc(colRef);
                        batchInsert.set(newDocRef, jsonData[i]);
                        insCount++;
                        
                        if (insCount === 400 || i === jsonData.length - 1) {
                            await batchInsert.commit();
                            batchInsert = writeBatch(db);
                            insCount = 0;
                        }
                    }

                    statusDiv.innerHTML = `<span style='color:#22c55e;'>✅ تمت العملية بنجاح! تم مزامنة ${jsonData.length} سجل. Dashboard محدثة الآن.</span>`;
                } catch (error) {
                    console.error("Error:", error);
                    statusDiv.innerHTML = `<span style='color:#ef4444;'>❌ حدث خطأ: ${error.message}</span>`;
                }
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
