<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - رفع البيانات</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="card" style="text-align: center; border-top: 5px solid #2563eb;">
            <h2>تحديث قاعدة البيانات 📊</h2>
            <p>اختر ملف Excel لتحديث لوحة المعلومات في المشروع الجديد</p>
            
            <div style="margin: 30px 0; padding: 20px; border: 2px dashed #ccc; border-radius: 10px;">
                <input type="file" id="excelFile" accept=".xlsx, .xls">
            </div>

            <button id="uploadBtn" style="padding: 12px 25px; background: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer;">
                رفع وتحديث البيانات الآن
            </button>

            <div id="statusContainer" style="margin-top: 20px; padding: 15px; border-radius: 5px; display: none;">
                <p id="statusMessage" style="font-weight: bold; margin: 0;"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // إعدادات مشروعك الجديد (analytics-dashboard-bb7af)
        const firebaseConfig = {
            apiKey: "AIzaSyA360HpoGNdaNiCqXt31SFVdQAw94Av7DI",
            authDomain: "analytics-dashboard-bb7af.firebaseapp.com",
            projectId: "analytics-dashboard-bb7af",
            storageBucket: "analytics-dashboard-bb7af.firebasestorage.app",
            messagingSenderId: "298567108374",
            appId: "1:298567108374:web:3124038389ca2880ccf237",
            measurementId: "G-F7RRTE378K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const showStatus = (msg, isError = false) => {
            const container = document.getElementById('statusContainer');
            const text = document.getElementById('statusMessage');
            container.style.display = 'block';
            container.style.backgroundColor = isError ? '#fee2e2' : '#dcfce7';
            text.style.color = isError ? '#dc2626' : '#16a34a';
            text.innerText = msg;
        };

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('excelFile');
            if (!fileInput.files.length) {
                showStatus("⚠️ يرجى اختيار ملف أولاً", true);
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            showStatus("⏳ جاري قراءة الملف...");

            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

                    if (jsonData.length === 0) {
                        showStatus("❌ الملف فارغ أو غير صحيح", true);
                        return;
                    }

                    showStatus(`⏳ جاري رفع ${jsonData.length} سجل إلى Firebase...`);

                    const colRef = collection(db, "mainData");
                    const batch = writeBatch(db);

                    // حذف البيانات القديمة أولاً
                    const snapshot = await getDocs(colRef);
                    snapshot.forEach(d => batch.delete(d.ref));

                    // إضافة البيانات الجديدة
                    jsonData.forEach(row => {
                        const newDoc = doc(colRef);
                        batch.set(newDoc, row);
                    });

                    await batch.commit();
                    showStatus("✅ تم رفع الملف وتحديث البيانات بنجاح!");

                } catch (error) {
                    console.error("Firebase Error:", error);
                    showStatus("❌ فشل الرفع: تأكد من إعدادات الحماية (Rules) في Firebase", true);
                }
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
