<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - رفع البيانات الضخمة</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="card" style="text-align: center; border-top: 5px solid #2563eb;">
            <h2>تحديث البيانات (الرفع الضخم) 🚀</h2>
            <p>سيتم رفع **9599 سطر** مقسمة إلى مجموعات لضمان قبولها في Firebase</p>
            
            <div style="margin: 30px 0; padding: 20px; border: 2px dashed #ccc; border-radius: 10px;">
                <input type="file" id="excelFile" accept=".xlsx, .xls">
            </div>

            <button id="uploadBtn" style="padding: 12px 25px; background: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer;">
                بدء الرفع المتتابع
            </button>

            <div id="statusContainer" style="margin-top: 20px; padding: 15px; border-radius: 5px; display: none;">
                <p id="statusMessage" style="font-weight: bold; margin: 0;"></p>
                <div style="width: 100%; background: #eee; height: 10px; border-radius: 5px; margin-top: 10px;">
                    <div id="progressBar" style="width: 0%; background: #2563eb; height: 100%; border-radius: 5px; transition: width 0.3s;"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA360HpoGNdaNiCqXt31SFVdQAw94Av7DI",
            authDomain: "analytics-dashboard-bb7af.firebaseapp.com",
            projectId: "analytics-dashboard-bb7af",
            storageBucket: "analytics-dashboard-bb7af.firebasestorage.app",
            messagingSenderId: "298567108374",
            appId: "1:298567108374:web:3124038389ca2880ccf237"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const updateUI = (msg, progress, isError = false) => {
            const container = document.getElementById('statusContainer');
            const text = document.getElementById('statusMessage');
            const bar = document.getElementById('progressBar');
            container.style.display = 'block';
            text.style.color = isError ? '#dc2626' : '#1e293b';
            text.innerText = msg;
            bar.style.width = progress + "%";
            if(isError) bar.style.background = 'red';
        };

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('excelFile');
            if (!fileInput.files.length) return updateUI("⚠️ اختر ملفاً أولاً", 0, true);

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    
                    const totalRows = jsonData.length;
                    updateUI(`⏳ جاري تنظيف البيانات القديمة...`, 5);

                    const colRef = collection(db, "mainData");
                    
                    // 1. مسح البيانات القديمة (أيضاً على حزم)
                    const snapshot = await getDocs(colRef);
                    let deleteBatch = writeBatch(db);
                    let count = 0;
                    for (const d of snapshot.docs) {
                        deleteBatch.delete(d.ref);
                        count++;
                        if (count === 500) {
                            await deleteBatch.commit();
                            deleteBatch = writeBatch(db);
                            count = 0;
                        }
                    }
                    if (count > 0) await deleteBatch.commit();

                    // 2. الرفع الجديد على حزم (500 سطر لكل حزمة)
                    updateUI(`🚀 بدء رفع ${totalRows} سطر...`, 10);
                    
                    for (let i = 0; i < totalRows; i += 500) {
                        const batch = writeBatch(db);
                        const chunk = jsonData.slice(i, i + 500);
                        
                        chunk.forEach(row => {
                            const newDoc = doc(colRef);
                            batch.set(newDoc, row);
                        });

                        await batch.commit();
                        const progress = Math.round(((i + chunk.length) / totalRows) * 90) + 10;
                        updateUI(`⏳ تم رفع ${i + chunk.length} من ${totalRows}...`, progress);
                    }

                    updateUI("✅ تم رفع كافة البيانات بنجاح!", 100);
                } catch (error) {
                    console.error(error);
                    updateUI("❌ خطأ: " + error.message, 100, true);
                }
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
