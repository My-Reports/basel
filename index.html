<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMS EXE | Live Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0a0f1c; --card-bg: #161e2d; --accent: #0ea5e9;
            --success: #10b981; --danger: #f43f5e; --gold: #eab308; --text-white: #f1f5f9;
        }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-body); color: var(--text-white); margin: 0; padding: 20px; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-body); z-index: 9999; display: flex;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(90deg, #1e293b, #0f172a); padding: 20px 30px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #334155; }
        .switch-container { display: flex; align-items: center; background: #1e293b; padding: 5px; border-radius: 50px; border: 1px solid #475569; }
        .switch-btn { padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; border: none; background: transparent; color: #94a3b8; font-family: inherit;}
        .switch-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4); }
        .dashboard-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h3 { margin-top: 0; color: var(--accent); border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .table-wrapper { max-height: 500px; overflow-y: auto; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        thead { position: sticky; top: 0; background: #1e293b; z-index: 10; }
        th, td { padding: 15px; border-bottom: 1px solid #1e293b; }
        th { font-weight: 700; color: #94a3b8; }
        .highlight-dad { background: rgba(234, 179, 8, 0.08) !important; border-right: 5px solid var(--gold); }
        .highlight-dad td:nth-child(2) { color: var(--gold); font-weight: bold; }
        .rank-badge { background: #334155; padding: 4px 10px; border-radius: 6px; font-size: 0.9em; }
        .growth-up { color: var(--success); direction: ltr; }
        .growth-down { color: var(--danger); direction: ltr; }
        .table-wrapper::-webkit-scrollbar { width: 6px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @media (max-width: 1100px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <h3 style="margin-top: 20px; border:none; color: var(--accent);">جاري جلب البيانات من السحابة...</h3>
    </div>

    <div class="header" id="mainHeader" style="display: none;">
        <div>
            <h1 style="margin:0; font-size: 24px;">AMS EXE | التحليل الحي للمبيعات</h1>
            <p style="margin:5px 0 0 0; color: #10b981;">● متصل بقاعدة البيانات (Live)</p>
        </div>
        <div class="switch-container">
            <button id="btn-val" class="switch-btn" onclick="window.toggleMetric('value')">القيمة المالية (USD)</button>
            <button id="btn-unit" class="switch-btn active" onclick="window.toggleMetric('unit')">كمية الوحدات (Units)</button>
        </div>
    </div>

    <div class="dashboard-grid" id="dashboardContent" style="display: none;">
        <div class="card">
            <h3>ترتيب الشركات وحصتها السوقية</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>الترتيب</th>
                            <th>الشركة المصنعة</th>
                            <th id="th-24">2024 Units</th>
                            <th id="th-25">2025 Units</th>
                            <th>النمو %</th>
                            <th>الحصة %</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body"></tbody>
                </table>
            </div>
        </div>
        <div class="card">
            <h3>توزيع الحصة السوقية (2025)</h3>
            <div style="position: relative; height: 350px;">
                <canvas id="marketChart"></canvas>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7NXaKA73Ej9ixU28fpgex2144W5eymTY",
            authDomain: "ams-dashboard-a17e6.firebaseapp.com",
            projectId: "ams-dashboard-a17e6",
            storageBucket: "ams-dashboard-a17e6.firebasestorage.app",
            messagingSenderId: "1085957371828",
            appId: "1:1085957371828:web:5ba822ac622422a43464e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let aggregatedData = [];
        window.currentMetric = 'unit'; 
        let chartObj = null;

        // الاتصال اللحظي بقاعدة البيانات
        const colRef = collection(db, "ams_sales_data");
        onSnapshot(colRef, (snapshot) => {
            const dataArray = [];
            snapshot.forEach((doc) => dataArray.push(doc.data()));
            
            if(dataArray.length > 0) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('mainHeader').style.display = 'flex';
                document.getElementById('dashboardContent').style.display = 'grid';
                processData(dataArray);
            }
        });

        function processData(data) {
            const companyMap = {};
            data.forEach(row => {
                let manf = row['Manufacturer'] || row['Manufacturer ']; 
                let u24 = parseFloat(row['2024_Units']) || 0;
                let u25 = parseFloat(row['2025_Units']) || 0;
                let v24 = parseFloat(row['2024_Value(USD)']) || 0;
                let v25 = parseFloat(row['2025_Value(USD)']) || 0;

                if (!manf) return;

                if (!companyMap[manf]) {
                    companyMap[manf] = { name: manf, units24: 0, units25: 0, value24: 0, value25: 0 };
                }

                companyMap[manf].units24 += u24;
                companyMap[manf].units25 += u25;
                companyMap[manf].value24 += v24;
                companyMap[manf].value25 += v25;
            });

            aggregatedData = Object.values(companyMap);
            renderAll();
        }

        window.formatNum = function(n) {
            if (window.currentMetric === 'value') {
                return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(n);
            }
            return new Intl.NumberFormat('en-US', { maximumFractionDigits: 2 }).format(n);
        }

        window.toggleMetric = function(m) {
            if(aggregatedData.length === 0) return;
            window.currentMetric = m;
            document.getElementById('btn-unit').classList.toggle('active', m === 'unit');
            document.getElementById('btn-val').classList.toggle('active', m === 'value');
            document.getElementById('th-24').innerText = m === 'unit' ? '2024 Units' : '2024 Value (USD)';
            document.getElementById('th-25').innerText = m === 'unit' ? '2025 Units' : '2025 Value (USD)';
            renderAll();
        }

        function renderAll() {
            let processed = aggregatedData.map(d => {
                let v24 = window.currentMetric === 'unit' ? d.units24 : d.value24;
                let v25 = window.currentMetric === 'unit' ? d.units25 : d.value25;
                let growth = v24 === 0 ? 0 : ((v25 - v24) / v24 * 100);
                return { ...d, v24, v25, growth };
            }).sort((a, b) => b.v25 - a.v25);

            const total25 = processed.reduce((sum, item) => sum + item.v25, 0);
            const tbody = document.getElementById('main-table-body');
            tbody.innerHTML = '';
            
            processed.forEach((item, index) => {
                let share = total25 === 0 ? 0 : (item.v25 / total25 * 100);
                let rowClass = item.name.toUpperCase().includes("DAR AL-DAWA") ? "highlight-dad" : "";
                let growthSign = item.growth > 0 ? "+" : "";
                let growthClass = item.growth >= 0 ? "growth-up" : "growth-down";

                tbody.innerHTML += `
                    <tr class="${rowClass}">
                        <td><span class="rank-badge">${index + 1}</span></td>
                        <td>${item.name}</td>
                        <td>${window.formatNum(item.v24)}</td>
                        <td>${window.formatNum(item.v25)}</td>
                        <td class="${growthClass}">${growthSign}${item.growth.toFixed(2)}%</td>
                        <td>${share.toFixed(2)}%</td>
                    </tr>
                `;
            });

            renderChart(processed.slice(0, 10));
        }

        function renderChart(data) {
            const ctx = document.getElementById('marketChart').getContext('2d');
            if (chartObj) chartObj.destroy();

            chartObj = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.map(d => d.name),
                    datasets: [{
                        data: data.map(d => d.v25),
                        backgroundColor: ['#eab308', '#0ea5e9', '#10b981', '#f43f5e', '#8b5cf6', '#f97316', '#64748b', '#3b82f6', '#14b8a6', '#db2777'],
                        borderWidth: 0, hoverOffset: 15
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { color: '#94a3b8', font: { family: 'Tajawal' } } },
                        tooltip: { callbacks: { label: (ctx) => ` ${ctx.label}: ${window.formatNum(ctx.raw)}` } }
                    },
                    cutout: '65%'
                }
            });
        }
    </script>
</body>
</html>
